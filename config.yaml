# ============================================================
# SOMEONE-CALL-ME — ตั้งค่าการฟังชื่อ
# ============================================================

# ชื่อของคุณ (ใส่ได้หลายชื่อ / ชื่อเล่น)
names:
  - "คีย์บอร์ด"
  - "คีบอด"
  - "Keyboard"
  # - "Somchai"
  # - "john"

# คำที่ออกเสียงคล้ายกัน (ถ้าไม่ใส่ โปรแกรมจะสร้างให้อัตโนมัติ)
# ตัวอย่าง: ถ้าชื่อ "John" → jon, joan, johnny ฯลฯ
aliases: []

# ความไวในการจับชื่อ (0–100)
# ต่ำ = จับง่ายแม้เสียงคล้าย/ไกล | สูง = ต้องใกล้เคียงชื่อจริง
# แนะนำเริ่มที่ 65–75
sensitivity: 68

# ระยะ cooldown หลังแจ้งเตือนแล้ว (วินาที) กันแจ้งซ้ำ
cooldown_seconds: 8

# ภาษาที่ฟัง (th = ไทย, en = อังกฤษ, auto = ทั้งคู่)
language: "th"

# โมเดล Whisper: tiny | base | small | medium
# เล็ก = เร็ว | ใหญ่ = แม่น (โดยเฉพาะเสียงไกล)
whisper_model: "base"

# อุปกรณ์ไมค์ (null = ค่าเริ่มต้นของระบบ)
# รัน: python main.py --list-mics เพื่อดูรายการ
microphone_index: null

# ความยาวชิ้นเสียงที่ประมวลผลครั้งละ (วินาที)
chunk_seconds: 2.5

# เกณฑ์พลังงานเสียงขั้นต่ำ (0.0–1.0) — ต่ำ = จับเสียงเบา/ไกลได้ดี
# ถ้ามี noise เยอะ ให้เพิ่มค่านี้นิดหน่อย
energy_threshold: 0.012

# วิธีแจ้งเตือน
alert:
  # เสียงบี๊บ / เล่นไฟล์เสียง
  sound: true
  # จำนวนครั้งที่บี๊บ
  beep_count: 4
  # Windows toast notification
  toast: true
  # ข้อความแจ้งเตือน
  title: "มีคนเรียกคุณ!"
  message: "ได้ยินชื่อคล้าย ๆ ว่า: {matched}"
  # พูดออกเสียง (Windows SAPI TTS)
  speak: true
  speak_text: "มีคนเรียกคุณครับ"
